name: NuGet Pack & Publish

on:
  push:
    tags:
      - '**/v*'  # e.g., HVO.Core/v1.1.1, HVO.Astronomy/v1.0.1
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        type: choice
        options:
          - HVO.Core
          - HVO.Core.SourceGenerators
          - HVO.Iot.Devices
          - HVO.Astronomy
          - HVO.Astronomy.CFITSIO
          - HVO.Astronomy.CFITSIO.NativeAssets
          - HVO.Astronomy.TheSkyX
          - HVO.Weather
          - HVO.Weather.DavisVantagePro
          - HVO.Power.OutbackMate
          - HVO.NinaClient
          - HVO.ZWOOptical.ASISDK
      target:
        description: 'Publish target'
        required: true
        type: choice
        options:
          - nuget.org
          - github-packages
          - both
        default: nuget.org

jobs:
  # ── Always runs: build + test + pack validation ──
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            9.0.x
            10.0.x
      - name: Build
        run: dotnet build --configuration Release
      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

  pack:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            9.0.x
            10.0.x
      - name: Build
        run: dotnet build --configuration Release
      - name: Pack all projects
        run: dotnet pack --configuration Release --no-build --output ./artifacts
      - uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg

  # ── Only on tag push or manual dispatch: publish ──
  publish-nuget:
    needs: pack
    if: >
      (startsWith(github.ref, 'refs/tags/'))
      || (github.event_name == 'workflow_dispatch'
          && (github.event.inputs.target == 'nuget.org' || github.event.inputs.target == 'both'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: nuget-packages
          path: ./artifacts
      - name: Determine package filter
        id: filter
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            PACKAGE_NAME="${{ github.event.inputs.package }}"
          else
            # Extract package name from tag: "HVO.Core/v1.1.1" -> "HVO.Core"
            TAG="${GITHUB_REF#refs/tags/}"
            PACKAGE_NAME="${TAG%%/v*}"
          fi
          echo "package_name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "Publishing package: ${PACKAGE_NAME}"
      - name: Push to NuGet.org
        run: >
          dotnet nuget push "./artifacts/${{ steps.filter.outputs.package_name }}.*.nupkg"
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
      - name: Push symbols to NuGet.org
        run: >
          dotnet nuget push "./artifacts/${{ steps.filter.outputs.package_name }}.*.snupkg"
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

  publish-github:
    needs: pack
    if: >
      (startsWith(github.ref, 'refs/tags/'))
      || (github.event_name == 'workflow_dispatch'
          && (github.event.inputs.target == 'github-packages' || github.event.inputs.target == 'both'))
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: nuget-packages
          path: ./artifacts
      - name: Determine package filter
        id: filter
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            PACKAGE_NAME="${{ github.event.inputs.package }}"
          else
            # Extract package name from tag: "HVO.Core/v1.1.1" -> "HVO.Core"
            TAG="${GITHUB_REF#refs/tags/}"
            PACKAGE_NAME="${TAG%%/v*}"
          fi
          echo "package_name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "Publishing package: ${PACKAGE_NAME}"
      - name: Push to GitHub Packages
        run: >
          dotnet nuget push "./artifacts/${{ steps.filter.outputs.package_name }}.*.nupkg"
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --source https://nuget.pkg.github.com/RoySalisbury/index.json
          --skip-duplicate
      - name: Push symbols to GitHub Packages
        run: >
          dotnet nuget push "./artifacts/${{ steps.filter.outputs.package_name }}.*.snupkg"
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --source https://nuget.pkg.github.com/RoySalisbury/index.json
          --skip-duplicate
